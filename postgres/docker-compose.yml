services:
  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: postgres # default system DB; custom DBs created by init script
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro # runs once on first startup
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────
  # pgAdmin — PostgreSQL Database Viewer / UI
  # ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: "False" # single-user desktop mode
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────
  # Dozzle — Real-time Log & Metrics Viewer
  # ──────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    environment:
      DOZZLE_LEVEL: info # log level: debug | info | warn | error
      DOZZLE_TAILSIZE: 300 # lines of history shown on connect
      DOZZLE_ENABLE_ACTIONS: true # allow start/stop/restart from UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # read-only Docker socket
    ports:
      - "8080:8080"
    networks:
      - backend

# ──────────────────────────────────────────
# Named Volumes
# ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# ──────────────────────────────────────────
# Networks
# ──────────────────────────────────────────
networks:
  backend:
    driver: bridge
